<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opinions System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-indigo-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold cursor-pointer" onclick="showView('feedView')">Opinions_System</h1>
            <div id="userInfo" class="hidden flex items-center gap-4">
                <span id="welcomeName" class="font-medium"></span>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm transition">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-4xl">
        
        <section id="loginView" class="view bg-white p-8 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Iniciar Sesión</h2>
            <div class="max-w-sm mx-auto space-y-4">
                <input id="loginUser" type="text" placeholder="Username o Email" class="w-full p-3 border rounded-lg">
                <input id="loginPass" type="password" placeholder="Contraseña" class="w-full p-3 border rounded-lg">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 font-bold">Entrar</button>
                <p class="text-center text-sm text-gray-500">
                    ¿No tienes cuenta? <a href="#" onclick="showView('registerView')" class="text-indigo-600 font-bold">Regístrate aquí</a>
                </p>
            </div>
        </section>

        <section id="registerView" class="view hidden bg-white p-8 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Crear Cuenta Nueva</h2>
            <div class="max-w-md mx-auto space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input id="regName" type="text" placeholder="Nombre" class="p-3 border rounded-lg">
                    <input id="regSurname" type="text" placeholder="Apellido" class="p-3 border rounded-lg">
                </div>
                <input id="regUsername" type="text" placeholder="Username" class="w-full p-3 border rounded-lg">
                <input id="regEmail" type="email" placeholder="Correo electrónico" class="w-full p-3 border rounded-lg">
                <input id="regPass" type="password" placeholder="Contraseña" class="w-full p-3 border rounded-lg">
                <button onclick="handleRegister()" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-bold">Finalizar Registro</button>
                <p class="text-center text-sm text-gray-500">
                    ¿Ya tienes cuenta? <a href="#" onclick="showView('loginView')" class="text-indigo-600 font-bold">Volver al login</a>
                </p>
            </div>
        </section>

        <section id="feedView" class="view hidden">
            <div class="bg-white p-6 rounded-xl shadow-md mb-8">
                <h2 class="text-lg font-bold mb-4 text-gray-700">Comparte tu opinión</h2>
                <input id="pubTitle" type="text" placeholder="Título" class="w-full mb-2 p-2 border rounded font-bold">
                <select id="pubCategory" class="w-full mb-2 p-2 border rounded text-gray-600">
                    <option value="DEPORTES">DEPORTES</option>
                    <option value="NOTICIAS">NOTICIAS</option>
                    <option value="TECNOLOGÍA">TECNOLOGÍA</option>
                </select>
                <textarea id="pubContent" placeholder="¿En qué piensas?" class="w-full mb-4 p-2 border rounded h-20"></textarea>
                <button onclick="createPublication()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">Publicar</button>
            </div>

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Muro</h2>
                <div class="flex gap-2">
                    <button onclick="fetchPublications()" class="bg-gray-200 px-4 py-1 rounded-full text-sm">Ver Todo</button>
                    <button onclick="fetchMyPublications()" class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm">Mis Posts</button>
                </div>
            </div>

            <div id="feed" class="space-y-4"></div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
